<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlockedTails.com - Flight Tracking & Aviation Intelligence</title>
    <script src='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css' rel='stylesheet' />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 320px;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            border-right: 1px solid #2d3748;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .header {
            padding: 24px;
            border-bottom: 1px solid #2d3748;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            color: #a0aec0;
            font-size: 14px;
            margin-bottom: 24px;
        }

        /* Search */
        .search-container {
            position: relative;
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #4a5568;
            border-radius: 8px;
            color: white;
            font-size: 14px;
        }

        .search-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-button {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 6px;
            padding: 6px 12px;
            color: white;
            font-size: 12px;
            cursor: pointer;
        }

        /* Stats */
        .stats {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .stat-value {
            color: #667eea;
            font-weight: 600;
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .control-button {
            flex: 1;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #4a5568;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .control-button:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #667eea;
        }

        /* Aircraft List */
        .aircraft-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 24px 24px;
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-top: 16px;
            border-top: 1px solid #2d3748;
        }

        .list-title {
            font-size: 16px;
            font-weight: 600;
        }

        .list-count {
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
        }

        .aircraft-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #2d3748;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .aircraft-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: #4a5568;
        }

        .aircraft-item.blocked {
            border-left: 4px solid #ff4757;
        }

        .aircraft-item.found {
            border-left: 4px solid #2ed573;
        }

        .aircraft-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .tail-number {
            font-weight: 600;
            font-size: 16px;
        }

        .aircraft-type {
            color: #a0aec0;
            font-size: 12px;
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .aircraft-info {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            font-size: 12px;
            color: #a0aec0;
        }

        /* Map */
        .map-container {
            flex: 1;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        /* Status Bar */
        .status-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.8);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            border-top: 1px solid #2d3748;
        }

        .status-text {
            color: #a0aec0;
        }

        .status-text.active {
            color: #2ed573;
        }

        /* Loading */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                height: 40vh;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="header">
                <div class="logo">
                    <div class="logo-icon">BT</div>
                    <div class="logo-text">BlockedTails</div>
                </div>
                <div class="tagline">Real-time Flight Tracking & Aviation Intelligence</div>
                
                <div class="search-container">
                    <input type="text" id="searchInput" class="search-input" placeholder="Search tail number (e.g., N280PH)">
                    <button id="searchBtn" class="search-button">Search</button>
                </div>

                <div class="stats">
                    <div class="stat-item">
                        <span>Aircraft Tracked:</span>
                        <span id="totalAircraft" class="stat-value">0</span>
                    </div>
                    <div class="stat-item">
                        <span>Blocked Tails:</span>
                        <span id="blockedCount" class="stat-value">0</span>
                    </div>
                    <div class="stat-item">
                        <span>Last Update:</span>
                        <span id="lastUpdate" class="stat-value">--:--</span>
                    </div>
                </div>

                <div class="controls">
                    <button id="refreshBtn" class="control-button">🔄 Refresh</button>
                    <button id="zoomInBtn" class="control-button">+ Zoom In</button>
                    <button id="zoomOutBtn" class="control-button">- Zoom Out</button>
                    <button id="resetViewBtn" class="control-button">🗺️ Reset View</button>
                </div>
            </div>

            <div class="aircraft-list">
                <div class="list-header">
                    <div class="list-title">Active Aircraft</div>
                    <div id="aircraftCount" class="list-count">0</div>
                </div>
                <div id="aircraftList">
                    <!-- Aircraft items will be inserted here -->
                </div>
            </div>
        </div>

        <!-- Map -->
        <div class="map-container">
            <div id="map"></div>
            <div class="status-bar">
                <div id="statusText" class="status-text">Initializing application...</div>
                <div id="stats">Aircraft: 0 | Blocked: 0 | Last Update: --:--</div>
            </div>
            <div id="loading" class="loading">
                <div class="spinner"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
