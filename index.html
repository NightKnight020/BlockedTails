<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlockedTails — Live Flight Intelligence</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #0a0e1a; --bg2: #111827; --card: #1a2234;
  --accent: #3b82f6; --red: #ef4444; --green: #22c55e;
  --yellow: #f59e0b; --purple: #a855f7;
  --text: #f1f5f9; --muted: #64748b; --border: #1e293b;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; background:var(--bg); color:var(--text); height:100vh; overflow:hidden; display:flex; flex-direction:column; }

/* NAV */
nav { height:54px; background:rgba(10,14,26,0.98); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 16px; gap:12px; flex-shrink:0; z-index:1000; }
.logo { display:flex; align-items:center; gap:8px; }
.logo-mark { background:linear-gradient(135deg,#3b82f6,#6366f1); border-radius:7px; width:30px; height:30px; display:flex; align-items:center; justify-content:center; font-size:15px; }
.logo-name { font-size:17px; font-weight:800; letter-spacing:-0.5px; }
.search-wrap { flex:1; max-width:380px; display:flex; gap:6px; }
.search-wrap input { flex:1; background:var(--card); border:1px solid var(--border); border-radius:8px; padding:8px 14px; color:var(--text); font-size:13px; outline:none; }
.search-wrap input:focus { border-color:var(--accent); }
.search-wrap input::placeholder { color:var(--muted); }
.btn { background:var(--accent); border:none; border-radius:7px; padding:8px 14px; color:#fff; font-size:12px; font-weight:600; cursor:pointer; white-space:nowrap; }
.btn:hover { background:#2563eb; }
.btn.outline { background:var(--card); border:1px solid var(--border); color:var(--text); }
.btn.outline:hover { border-color:var(--accent); }
.pills { display:flex; gap:8px; margin-left:auto; }
.pill { display:flex; align-items:center; gap:5px; background:var(--card); border:1px solid var(--border); border-radius:20px; padding:4px 12px; font-size:12px; }
.dot { width:7px; height:7px; border-radius:50%; }
.dot.blue { background:var(--accent); animation:blink 2s infinite; }
.dot.red { background:var(--red); animation:blink 2s infinite; }
.dot.green { background:var(--green); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* LAYOUT */
.main { display:flex; flex:1; overflow:hidden; }

/* SIDEBAR */
.sidebar { width:320px; background:var(--bg2); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; }
.sb-header { padding:10px 12px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.sb-title { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
.tabs { display:flex; gap:4px; }
.tab { padding:3px 10px; border-radius:5px; font-size:11px; font-weight:500; cursor:pointer; border:none; background:none; color:var(--muted); }
.tab.on { background:var(--accent); color:#fff; }
.tab:hover:not(.on) { background:var(--card); color:var(--text); }
.list { flex:1; overflow-y:auto; padding:8px; }
.list::-webkit-scrollbar { width:3px; }
.list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

/* CARD */
.card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:11px 12px; margin-bottom:5px; cursor:pointer; transition:all 0.15s; }
.card:hover { border-color:var(--accent); transform:translateX(2px); }
.card.sel { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent); }
.card.blk { border-color:var(--red); }
.card-top { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.ac-icon { width:30px; height:30px; border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; }
.ac-call { font-size:14px; font-weight:700; }
.ac-icao { font-size:10px; color:var(--muted); font-family:monospace; }
.card-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:5px; }
.sbox { background:var(--bg); border-radius:5px; padding:5px 7px; }
.slbl { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; }
.sval { font-size:11px; font-weight:600; }

/* MAP */
.map-wrap { flex:1; position:relative; }
#map { width:100%; height:100%; background:#0d1117; }

/* Leaflet dark tiles */
.leaflet-tile { filter:brightness(0.85) saturate(0.7); }

/* DETAIL PANEL */
.detail { position:absolute; bottom:16px; left:50%; transform:translateX(-50%); background:rgba(17,24,39,0.96); backdrop-filter:blur(16px); border:1px solid var(--border); border-radius:14px; padding:16px 20px; min-width:460px; z-index:900; display:none; box-shadow:0 20px 60px rgba(0,0,0,0.6); }
.detail.on { display:block; }
.detail-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; }
.detail-call { font-size:24px; font-weight:800; }
.detail-sub { font-size:11px; color:var(--muted); margin-top:2px; }
.detail-close { background:var(--card); border:1px solid var(--border); border-radius:6px; width:28px; height:28px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:13px; color:var(--muted); }
.detail-close:hover { color:var(--text); }
.detail-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
.dstat { background:var(--card); border-radius:8px; padding:10px; text-align:center; }
.dstat-l { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
.dstat-v { font-size:15px; font-weight:700; }

/* MAP OVERLAY BTNS */
.map-btns { position:absolute; top:12px; right:12px; display:flex; flex-direction:column; gap:6px; z-index:800; }
.map-btn { background:rgba(17,24,39,0.92); backdrop-filter:blur(8px); border:1px solid var(--border); border-radius:7px; padding:7px 12px; color:var(--text); font-size:11px; font-weight:500; cursor:pointer; }
.map-btn:hover { border-color:var(--accent); }

/* LEGEND */
.legend { position:absolute; bottom:16px; right:12px; background:rgba(17,24,39,0.92); backdrop-filter:blur(8px); border:1px solid var(--border); border-radius:10px; padding:10px 14px; z-index:800; }
.leg-title { font-size:9px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:7px; }
.leg-row { display:flex; align-items:center; gap:7px; font-size:11px; color:var(--muted); margin-bottom:4px; }
.leg-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }

/* STATUS */
.status-bar { position:absolute; top:12px; left:12px; z-index:800; }
.status-badge { background:rgba(17,24,39,0.92); backdrop-filter:blur(8px); border:1px solid var(--border); border-radius:20px; padding:5px 12px; font-size:11px; display:flex; align-items:center; gap:6px; }

/* LOADING */
.overlay { position:absolute; inset:0; background:rgba(10,14,26,0.9); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:950; }
.spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.75s linear infinite; margin-bottom:14px; }
@keyframes spin { to { transform:rotate(360deg); } }

/* TOAST */
.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--card); border:1px solid var(--border); border-radius:8px; padding:10px 18px; font-size:13px; font-weight:500; z-index:9999; transition:transform 0.3s cubic-bezier(.34,1.56,.64,1); }
.toast.show { transform:translateX(-50%) translateY(0); }
.toast.ok { border-color:var(--green); color:var(--green); }
.toast.err { border-color:var(--red); color:var(--red); }
.toast.info { border-color:var(--accent); color:var(--accent); }

/* EMPTY */
.empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:180px; color:var(--muted); text-align:center; gap:8px; }
.empty-icon { font-size:28px; }
</style>
</head>
<body>

<nav>
  <div class="logo">
    <div class="logo-mark">✈</div>
    <span class="logo-name">BlockedTails</span>
  </div>
  <div class="search-wrap">
    <input id="searchInput" type="text" placeholder="Search tail # or callsign... (e.g. N280PH)" autocomplete="off">
    <button class="btn" onclick="doSearch()">Search</button>
  </div>
  <div class="pills">
    <div class="pill"><div class="dot blue"></div><span id="navTotal">0</span> live</div>
    <div class="pill"><div class="dot red"></div><span id="navBlocked">0</span> blocked</div>
    <div class="pill"><div class="dot green"></div>Live</div>
  </div>
</nav>

<div class="main">
  <div class="sidebar">
    <div class="sb-header">
      <span class="sb-title">Aircraft Feed</span>
      <div class="tabs">
        <button class="tab on" onclick="setFilter('all',this)">All</button>
        <button class="tab" onclick="setFilter('blocked',this)">🔴 Blocked</button>
        <button class="tab" onclick="setFilter('military',this)">🟡 Military</button>
      </div>
    </div>
    <div class="list" id="list"></div>
  </div>

  <div class="map-wrap">
    <div id="map"></div>

    <div class="status-bar">
      <div class="status-badge" id="statusBadge">
        <span id="statusText">Connecting...</span>
      </div>
    </div>

    <div class="map-btns">
      <button class="map-btn" onclick="resetView()">🌍 Reset</button>
      <button class="map-btn" onclick="refreshNow()">🔄 Refresh</button>
      <button class="map-btn" id="tileBtn" onclick="toggleTile()">🛰 Satellite</button>
    </div>

    <div class="legend">
      <div class="leg-title">Legend</div>
      <div class="leg-row"><div class="leg-dot" style="background:var(--accent)"></div>Commercial</div>
      <div class="leg-row"><div class="leg-dot" style="background:var(--red)"></div>Blocked Tail</div>
      <div class="leg-row"><div class="leg-dot" style="background:var(--yellow)"></div>Military</div>
      <div class="leg-row"><div class="leg-dot" style="background:var(--purple)"></div>Private/VIP</div>
    </div>

    <div class="detail" id="detail">
      <div class="detail-top">
        <div>
          <div class="detail-call" id="dCall">—</div>
          <div class="detail-sub" id="dSub">—</div>
        </div>
        <div class="detail-close" onclick="closeDetail()">✕</div>
      </div>
      <div class="detail-grid">
        <div class="dstat"><div class="dstat-l">Altitude</div><div class="dstat-v" id="dAlt">—</div></div>
        <div class="dstat"><div class="dstat-l">Speed</div><div class="dstat-v" id="dSpd">—</div></div>
        <div class="dstat"><div class="dstat-l">Heading</div><div class="dstat-v" id="dHdg">—</div></div>
        <div class="dstat"><div class="dstat-l">Latitude</div><div class="dstat-v" id="dLat">—</div></div>
        <div class="dstat"><div class="dstat-l">Longitude</div><div class="dstat-v" id="dLon">—</div></div>
      </div>
    </div>

    <div class="overlay" id="overlay">
      <div class="spinner"></div>
      <div style="font-size:13px;color:var(--muted)">Loading live flight data...</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──────────────────────────────────
const ADSB_KEY = 'YOUR_ADSB_KEY';
const BLOCKED = ['N280PH','N900SK','N123AB','N456CD','N789EF','BLOCKED'];
const MILITARY = ['RCH','RRR','JAKE','DUKE','REACH','EVAC','USAF','ARMY','NAVY','USMC','PAT','SAM','TOUGH','KNIFE'];
const REFRESH_MS = 30000;

// ── MAP SETUP ────────────────────────────────
const map = L.map('map', { zoomControl: false }).setView([39.5, -98.5], 5);

const darkTile = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© CartoDB', maxZoom: 19
});

const satTile = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  attribution: '© Esri', maxZoom: 19
});

darkTile.addTo(map);
L.control.zoom({ position: 'bottomleft' }).addTo(map);

let usingSat = false;
function toggleTile() {
  usingSat = !usingSat;
  if (usingSat) { map.removeLayer(darkTile); satTile.addTo(map); document.getElementById('tileBtn').textContent = '🌙 Dark'; }
  else { map.removeLayer(satTile); darkTile.addTo(map); document.getElementById('tileBtn').textContent = '🛰 Satellite'; }
}

// ── STATE ────────────────────────────────────
let aircraft = [], markers = {}, filter = 'all', selected = null;

// ── CLASSIFY ─────────────────────────────────
function classify(ac) {
  const cs = (ac.flight || '').trim().toUpperCase();
  const icao = (ac.icao || '').toUpperCase();
  if (BLOCKED.includes(cs) || BLOCKED.includes(icao)) return 'blocked';
  if (MILITARY.some(p => cs.startsWith(p))) return 'military';
  if (/^N[0-9]/.test(cs) && cs.length <= 7) return 'private';
  return 'commercial';
}

const COLORS = { blocked:'#ef4444', military:'#f59e0b', private:'#a855f7', commercial:'#3b82f6' };
const EMOJIS = { blocked:'🔴', military:'🟡', private:'🟣', commercial:'🔵' };

function makeIcon(type, heading) {
  const color = COLORS[type];
  const size = type === 'blocked' ? 22 : 16;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="${size}" height="${size}" style="transform:rotate(${heading||0}deg);filter:drop-shadow(0 0 4px ${color})">
    <path fill="${color}" d="M12 2L8 9H4l2.5 4L4 17l8-2 8 2-2.5-4L22 9h-4L12 2z"/>
  </svg>`;
  return L.divIcon({
    html: svg,
    iconSize: [size, size],
    iconAnchor: [size/2, size/2],
    className: ''
  });
}

// ── FETCH ────────────────────────────────────
async function fetchData() {
  setStatus('Fetching...', true);
  try {
    const r = await fetch('https://adsbexchange-com1.p.rapidapi.com/v2/lat/39.5/lon/-98.5/dist/500/', {
      headers: { 'x-rapidapi-key': ADSB_KEY, 'x-rapidapi-host': 'adsbexchange-com1.p.rapidapi.com' }
    });
    if (!r.ok) throw new Error(r.status);
    const d = await r.json();
    aircraft = (d.ac || []).filter(a => a.lat && a.lon);
    setStatus(`${aircraft.length} aircraft · ${new Date().toLocaleTimeString()}`, false);
    toast(`✅ ${aircraft.length} aircraft loaded`, 'ok');
  } catch(e) {
    loadMock();
    setStatus('Demo mode · Add API key for live data', false);
  }
  renderAll();
  hideOverlay();
}

function loadMock() {
  const names = ['DAL1492','UAL388','AAL77W','SWA2112','N280PH','RCH445','JAKE01','N900SK','FDX001','UPS2340','N1SP','ARMY01'];
  aircraft = Array.from({length:120}, (_,i) => ({
    icao: (0xA00000+i).toString(16).toUpperCase(),
    flight: names[i % names.length],
    lat: 26 + Math.random()*22,
    lon: -124 + Math.random()*52,
    alt_baro: Math.round(1000 + Math.random()*42000),
    gs: Math.round(100 + Math.random()*450),
    track: Math.round(Math.random()*360),
  }));
}

// ── RENDER ───────────────────────────────────
function renderAll() {
  renderMarkers();
  renderList();
  updatePills();
}

function renderMarkers() {
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  getFiltered().forEach(ac => {
    const type = classify(ac);
    const m = L.marker([ac.lat, ac.lon], { icon: makeIcon(type, ac.track) });
    m.on('click', () => selectAc(ac));
    m.addTo(map);
    markers[ac.icao] = m;
  });
}

function renderList() {
  const el = document.getElementById('list');
  const items = [...getFiltered()].sort((a,b) => {
    const ta=classify(a), tb=classify(b);
    if(ta==='blocked'&&tb!=='blocked') return -1;
    if(tb==='blocked'&&ta!=='blocked') return 1;
    if(ta==='military'&&tb!=='military') return -1;
    if(tb==='military'&&ta!=='military') return 1;
    return (b.alt_baro||0)-(a.alt_baro||0);
  });

  if(!items.length) { el.innerHTML='<div class="empty"><div class="empty-icon">📡</div><div>No aircraft found</div></div>'; return; }

  el.innerHTML = items.map(ac => {
    const type = classify(ac);
    const cs = (ac.flight||'').trim() || ac.icao || '???';
    const isSel = ac.icao === selected;
    const bg = type==='blocked' ? 'linear-gradient(135deg,#7f1d1d,#450a0a)' : type==='military' ? 'linear-gradient(135deg,#78350f,#451a03)' : 'linear-gradient(135deg,#1e3a5f,#0f2040)';
    return `<div class="card ${type==='blocked'?'blk':''} ${isSel?'sel':''}" onclick='selectAc(${JSON.stringify(ac)})'>
      <div class="card-top">
        <div class="ac-icon" style="background:${bg}">${EMOJIS[type]}</div>
        <div>
          <div class="ac-call">${cs}</div>
          <div class="ac-icao">${ac.icao||'???'} · ${type.toUpperCase()}</div>
        </div>
      </div>
      <div class="card-stats">
        <div class="sbox"><div class="slbl">Alt</div><div class="sval">${ac.alt_baro?Math.round(ac.alt_baro/100)*100+'ft':'—'}</div></div>
        <div class="sbox"><div class="slbl">Spd</div><div class="sval">${ac.gs?Math.round(ac.gs)+'kt':'—'}</div></div>
        <div class="sbox"><div class="slbl">Hdg</div><div class="sval">${ac.track?Math.round(ac.track)+'°':'—'}</div></div>
      </div>
    </div>`;
  }).join('');
}

function updatePills() {
  document.getElementById('navTotal').textContent = aircraft.length.toLocaleString();
  document.getElementById('navBlocked').textContent = aircraft.filter(a=>classify(a)==='blocked').length;
}

// ── SELECT ───────────────────────────────────
function selectAc(ac) {
  selected = ac.icao;
  map.flyTo([ac.lat, ac.lon], Math.max(map.getZoom(), 8), {duration:1});
  const type = classify(ac);
  const cs = (ac.flight||'').trim() || ac.icao || '???';
  document.getElementById('dCall').textContent = cs;
  document.getElementById('dSub').innerHTML = `ICAO: <b>${ac.icao||'—'}</b> &nbsp;·&nbsp; Type: <b style="color:${COLORS[type]}">${type.toUpperCase()}</b>`;
  document.getElementById('dAlt').textContent = ac.alt_baro ? Math.round(ac.alt_baro).toLocaleString()+' ft' : '—';
  document.getElementById('dSpd').textContent = ac.gs ? Math.round(ac.gs)+' kt' : '—';
  document.getElementById('dHdg').textContent = ac.track ? Math.round(ac.track)+'°' : '—';
  document.getElementById('dLat').textContent = ac.lat ? ac.lat.toFixed(4) : '—';
  document.getElementById('dLon').textContent = ac.lon ? ac.lon.toFixed(4) : '—';
  document.getElementById('detail').classList.add('on');
  renderList();
}

function closeDetail() {
  selected = null;
  document.getElementById('detail').classList.remove('on');
  renderList();
}

// ── SEARCH ───────────────────────────────────
function doSearch() {
  const q = document.getElementById('searchInput').value.trim().toUpperCase();
  if (!q) return;
  const match = aircraft.find(a =>
    (a.flight||'').trim().toUpperCase().includes(q) ||
    (a.icao||'').toUpperCase().includes(q)
  );
  if (match) { selectAc(match); toast(`✈ Found: ${(match.flight||'').trim()||match.icao}`, 'ok'); }
  else toast(`No aircraft matching "${q}"`, 'err');
}

document.getElementById('searchInput').addEventListener('keydown', e => e.key==='Enter' && doSearch());

// ── FILTER ───────────────────────────────────
function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  renderAll();
}

function getFiltered() {
  if (filter==='blocked') return aircraft.filter(a=>classify(a)==='blocked');
  if (filter==='military') return aircraft.filter(a=>classify(a)==='military');
  return aircraft;
}

// ── UTILS ────────────────────────────────────
function resetView() { map.flyTo([39.5,-98.5], 5, {duration:1}); }
function refreshNow() { fetchData(); }

function setStatus(txt, loading) {
  document.getElementById('statusBadge').innerHTML = loading
    ? `<span style="display:inline-block;width:10px;height:10px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.75s linear infinite"></span><span>${txt}</span>`
    : `<span style="color:var(--green)">●</span><span>${txt}</span>`;
}

function hideOverlay() {
  const o = document.getElementById('overlay');
  o.style.transition = 'opacity 0.4s';
  o.style.opacity = '0';
  setTimeout(()=>o.style.display='none', 400);
}

function toast(msg, type='info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(()=>t.classList.remove('show'), 3000);
}

// ── INIT ─────────────────────────────────────
fetchData();
setInterval(fetchData, REFRESH_MS);
</script>
</body>
</html>
